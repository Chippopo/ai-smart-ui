<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AI Color Palette Generator</title>

<style>
:root {
  --bg:#0f172a;
  --card:#111827;
  --accent:#22c55e;
  --text:#e5e7eb;
  --muted:#9ca3af;
}

* { box-sizing:border-box; }

body {
  margin:0;
  font-family: "Inter", system-ui, sans-serif;
  background:linear-gradient(135deg,#020617,#020617);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.app {
  background:var(--card);
  width:420px;
  padding:24px;
  border-radius:16px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

h1 {
  font-size:1.3rem;
  margin-bottom:4px;
}

p {
  color:var(--muted);
  font-size:.9rem;
  margin-bottom:20px;
}

label {
  font-size:.8rem;
  display:block;
  margin-top:16px;
  margin-bottom:6px;
}

select, button {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#020617;
  color:var(--text);
  font-size:.95rem;
}

button {
  margin-top:20px;
  background:var(--accent);
  color:#022c22;
  font-weight:600;
  cursor:pointer;
}

button:hover {
  filter:brightness(1.1);
}

.palette {
  display:flex;
  gap:10px;
  margin-top:24px;
}

.swatch {
  flex:1;
  height:90px;
  border-radius:12px;
  display:flex;
  align-items:end;
  padding:8px;
  font-size:.7rem;
  color:white;
}
#explanations {
  margin-top: 16px;
}

#explanations h4 {
  margin: 8px 0;
  font-size: 0.9rem;
}

#explanations p {
  margin: 4px 0;
}

</style>
</head>

<body>

<div class="app">
  <h1>AI Color Recommender</h1>
  <p>Context-aware palette generation for UI designers</p>

  <label>Industry</label>
  <select id="industry">
    <option value="healthcare">Healthcare</option>
    <option value="finance">Finance</option>
    <option value="education">Education</option>
  </select>

  <label>Emotion</label>
  <select id="emotion">
    <option value="playful">Playful</option>
    <option value="professional">Professional</option>
    <option value="minimalist">Minimalist</option>
  </select>

  <button onclick="generatePalette()">Generate Palette</button>

  
  <div class="palette" id="palette"></div>
<div id="explanations"></div>

</div>

<script>

async function generatePalette() {
  const industry = document.getElementById("industry").value;
  const emotion = document.getElementById("emotion").value;

  const res = await fetch(
    `http://127.0.0.1:8000/generate-palette?industry=${industry}&emotion=${emotion}`
  );

  const data = await res.json();

  const paletteDiv = document.getElementById("palette");
  const explainDiv = document.getElementById("explanations");

  paletteDiv.innerHTML = "";
  explainDiv.innerHTML = "<h4>Why these colors?</h4>";

  data.palette.forEach(color => {
    const div = document.createElement("div");
    div.className = "swatch";
    div.style.background = color;
    div.textContent = color;
    paletteDiv.appendChild(div);
  });

  data.explanations.forEach(text => {
    const p = document.createElement("p");
    p.style.fontSize = "0.8rem";
    p.style.color = "#9ca3af";
    p.textContent = "• " + text;
    explainDiv.appendChild(p);
  });
}



</script>

</body>
</html>
